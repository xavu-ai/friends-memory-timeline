services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "6100:6100"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/friends_memory
      - FRIEND_PASSWORDS=${FRIEND_PASSWORDS:-{"alice": "secret1"}}
      - CORS_ORIGINS=["http://localhost:8100"]
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE=10485760
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6100/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=friends_memory
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
