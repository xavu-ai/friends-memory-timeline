services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "6100:6100"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/friends_memory
      - ALLOWED_ORIGINS=["http://localhost:8100"]
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE=10485760
      - PASSWORDS=${FRIEND_PASSWORDS:-["secret1","secret2","secret3"]}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6100/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=friends_memory
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d friends_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
